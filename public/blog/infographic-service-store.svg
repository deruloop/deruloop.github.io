<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .bg{fill:#F8EFDC}
      .box{fill:#F6E8CE;stroke:#0F1B23;stroke-width:1.5}
      .gold{fill:#D2931A;stroke:#0F1B23;stroke-width:1.5}
      .arrow{stroke:#0F1B23;stroke-width:1.5;fill:none;marker-end:url(#a)}
      text{fill:#0F1B23;font-size:12px}
      .cap{font-size:10px;letter-spacing:1.5px;opacity:.55;font-weight:600}
      .h{font-size:14px;font-weight:700}
      .sub{font-size:10px;opacity:.65}
      .lbl{font-size:11px;font-weight:600;fill:#0F1B23}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0F1B23"/>
    </marker>
  </defs>
  <rect class="bg" width="800" height="360"/>
  <text class="cap" x="40" y="36">SERVICE — STORE  ·  PRAGMATIC SwiftUI FLOW</text>

  <!-- triangle nodes -->
  <!-- View top -->
  <g transform="translate(400,90)">
    <rect class="box" x="-90" y="-30" width="180" height="60" rx="10"/>
    <text class="h" y="-2" text-anchor="middle">View</text>
    <text class="sub" y="16" text-anchor="middle">rendering + intents</text>
  </g>

  <!-- Service bottom-right -->
  <g transform="translate(620,260)">
    <rect class="gold" x="-90" y="-30" width="180" height="60" rx="10"/>
    <text class="h" y="-2" text-anchor="middle" fill="#fff">Service</text>
    <text y="16" text-anchor="middle" fill="#fff" font-size="10" opacity=".9">operations · side effects</text>
  </g>

  <!-- Store bottom-left -->
  <g transform="translate(180,260)">
    <rect class="box" x="-90" y="-30" width="180" height="60" rx="10"/>
    <text class="h" y="-2" text-anchor="middle">Store</text>
    <text class="sub" y="16" text-anchor="middle">@Observable state</text>
  </g>

  <!-- arrows: View -> Service -->
  <path class="arrow" d="M460,115 Q610,150 600,228"/>
  <text class="lbl" x="568" y="170">intent</text>

  <!-- Service -> Store mutation -->
  <path class="arrow" d="M530,260 L270,260"/>
  <text class="lbl" x="360" y="252" text-anchor="middle">mutates</text>

  <!-- Store -> View -->
  <path class="arrow" d="M200,228 Q190,150 340,115"/>
  <text class="lbl" x="195" y="180">observes</text>

  <text class="sub" x="400" y="330" text-anchor="middle">A soft Redux-like · TCA-inspired, but not TCA</text>
</svg>
