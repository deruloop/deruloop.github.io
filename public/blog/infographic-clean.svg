<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .bg{fill:#F8EFDC}
      .box{fill:#fff;stroke:#0F1B23;stroke-width:1.5}
      .gold{fill:#D2931A;stroke:#0F1B23;stroke-width:1.5}
      .dark{fill:#0F1B23}
      .flow{stroke:#0F1B23;stroke-width:2;fill:none;marker-end:url(#a)}
      .obs{stroke:#0F1B23;stroke-width:1.5;fill:none;stroke-dasharray:5 4;marker-end:url(#a)}
      .inj{stroke:#D2931A;stroke-width:2;fill:none;marker-end:url(#g)}
      text{fill:#0F1B23;font-family:-apple-system,system-ui,sans-serif}
      .cap{font-size:10px;letter-spacing:1.8px;font-weight:700;opacity:.6}
      .h{font-size:14px;font-weight:700}
      .sub{font-size:10.5px;opacity:.7}
      .lbl{font-size:10px;font-weight:600;letter-spacing:.5px}
      .lblg{font-size:10px;font-weight:700;fill:#A56F0F;letter-spacing:.5px}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0F1B23"/>
    </marker>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D2931A"/>
    </marker>
  </defs>
  <rect class="bg" width="820" height="460"/>
  <text class="cap" x="40" y="32">CLEAN SwiftUI  ·  FIVE ROLES, ONE COMPOSITION ROOT</text>

  <!-- Top cycle: View ⇄ AppState, with Interactor in the middle -->
  <!-- View -->
  <rect class="box" x="60" y="70" width="180" height="74" rx="12"/>
  <text class="h" x="150" y="100" text-anchor="middle">View</text>
  <text class="sub" x="150" y="120" text-anchor="middle">renders UI</text>
  <text class="sub" x="150" y="134" text-anchor="middle">sends user intents</text>

  <!-- Interactor -->
  <rect class="gold" x="320" y="70" width="180" height="74" rx="12"/>
  <text class="h" x="410" y="100" text-anchor="middle" fill="#fff">Interactor</text>
  <text x="410" y="120" text-anchor="middle" fill="#fff" font-size="10.5" opacity=".95">use cases / business logic</text>
  <text x="410" y="134" text-anchor="middle" fill="#fff" font-size="10.5" opacity=".95">writes to AppState</text>

  <!-- AppState -->
  <rect class="box" x="580" y="70" width="180" height="74" rx="12"/>
  <text class="h" x="670" y="100" text-anchor="middle">AppState</text>
  <text class="sub" x="670" y="120" text-anchor="middle">single source of truth</text>
  <text class="sub" x="670" y="134" text-anchor="middle">observable</text>

  <!-- View -> Interactor (intent) -->
  <path class="flow" d="M240,100 L318,100"/>
  <text class="lbl" x="279" y="92" text-anchor="middle">intent</text>

  <!-- Interactor -> AppState (writes) -->
  <path class="flow" d="M500,100 L578,100"/>
  <text class="lbl" x="539" y="92" text-anchor="middle">writes</text>

  <!-- AppState -> View (observes, dashed loop under) -->
  <path class="obs" d="M670,144 C670,200 150,200 150,146"/>
  <text class="lbl" x="410" y="195" text-anchor="middle">View observes AppState</text>

  <!-- Middle row: Repository & Service called by Interactor -->
  <rect class="box" x="200" y="240" width="180" height="60" rx="12"/>
  <text class="h" x="290" y="266" text-anchor="middle">Repository</text>
  <text class="sub" x="290" y="284" text-anchor="middle">data access (API, DB)</text>

  <rect class="box" x="440" y="240" width="180" height="60" rx="12"/>
  <text class="h" x="530" y="266" text-anchor="middle">Service</text>
  <text class="sub" x="530" y="284" text-anchor="middle">analytics, push, …</text>

  <!-- Interactor -> Repository / Service -->
  <path class="flow" d="M380,144 C360,180 320,210 300,238"/>
  <path class="flow" d="M440,144 C460,180 500,210 520,238"/>
  <text class="lbl" x="318" y="180" text-anchor="middle">calls</text>
  <text class="lbl" x="502" y="180" text-anchor="middle">calls</text>

  <!-- Bottom: DIContainer = the factory that builds everything above -->
  <text class="cap" x="40" y="346">COMPOSITION ROOT  ·  BUILDS &amp; CONNECTS THE FOUR ROLES ABOVE</text>
  <rect x="40" y="356" width="740" height="84" rx="12" class="dark"/>
  <text class="h" x="60" y="384" fill="#F8EFDC">DIContainer</text>
  <text x="60" y="402" fill="#F8EFDC" font-size="10.5" opacity=".75">at app launch, creates each role and injects its dependencies</text>
  <text x="60" y="418" fill="#F8EFDC" font-size="10.5" opacity=".75">swap implementations per environment ↓</text>

  <!-- env pills -->
  <rect x="500" y="392" width="80" height="28" rx="14" fill="none" stroke="#F8EFDC" opacity=".8"/>
  <text x="540" y="410" text-anchor="middle" fill="#F8EFDC" font-size="11">live</text>
  <rect x="590" y="392" width="80" height="28" rx="14" fill="none" stroke="#F8EFDC" opacity=".8"/>
  <text x="630" y="410" text-anchor="middle" fill="#F8EFDC" font-size="11">preview</text>
  <rect x="680" y="392" width="80" height="28" rx="14" fill="none" stroke="#F8EFDC" opacity=".8"/>
  <text x="720" y="410" text-anchor="middle" fill="#F8EFDC" font-size="11">test</text>

  <!-- Gold injection arrows from DI up to each role -->
  <path class="inj" d="M150,356 L150,146"/>
  <path class="inj" d="M290,356 L290,302"/>
  <path class="inj" d="M410,356 C410,330 410,200 410,146"/>
  <path class="inj" d="M530,356 L530,302"/>
  <text class="lblg" x="170" y="350">injects</text>
  <text class="lblg" x="310" y="350">injects</text>
  <text class="lblg" x="430" y="350">injects</text>
  <text class="lblg" x="550" y="350">injects</text>
</svg>
