<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .bg{fill:#F8EFDC}
      .box{fill:#fff;stroke:#0F1B23;stroke-width:1.5}
      .gold{fill:#D2931A;stroke:#0F1B23;stroke-width:1.5}
      .rootbox{fill:#FBF4E3;stroke:#D2931A;stroke-width:2;stroke-dasharray:6 4}
      .flow{stroke:#0F1B23;stroke-width:2;fill:none;marker-end:url(#a)}
      .obs{stroke:#0F1B23;stroke-width:1.5;fill:none;stroke-dasharray:5 4;marker-end:url(#a)}
      .inj{stroke:#D2931A;stroke-width:1.8;fill:none;marker-end:url(#g)}
      text{fill:#0F1B23}
      .cap{font-size:10px;letter-spacing:1.8px;font-weight:700;opacity:.6}
      .h{font-size:14px;font-weight:700}
      .sub{font-size:10.5px;opacity:.7}
      .lbl{font-size:10px;font-weight:600;letter-spacing:.5px}
      .lblg{font-size:10px;font-weight:700;fill:#A56F0F;letter-spacing:.5px}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0F1B23"/>
    </marker>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D2931A"/>
    </marker>
  </defs>
  <rect class="bg" width="820" height="460"/>
  <text class="cap" x="40" y="28">CLEAN SwiftUI  ·  FIVE ROLES, ONE COMPOSITION ROOT</text>

  <!-- DIContainer: dashed gold frame WRAPS everything to show it builds & owns the roles -->
  <rect class="rootbox" x="30" y="48" width="760" height="392" rx="16"/>
  <text class="lblg" x="48" y="68">DI CONTAINER  ·  COMPOSITION ROOT</text>
  <text class="sub" x="48" y="82">creates every role below and wires them together at app launch</text>

  <!-- Top row: View → Interactor → AppState -->
  <rect class="box" x="60" y="110" width="180" height="74" rx="12"/>
  <text class="h" x="150" y="140" text-anchor="middle">View</text>
  <text class="sub" x="150" y="158" text-anchor="middle">renders UI</text>
  <text class="sub" x="150" y="172" text-anchor="middle">sends user intents</text>

  <rect class="gold" x="320" y="110" width="180" height="74" rx="12"/>
  <text class="h" x="410" y="140" text-anchor="middle" fill="#fff">Interactor</text>
  <text x="410" y="158" text-anchor="middle" fill="#fff" font-size="10.5" opacity=".95">use cases / business logic</text>
  <text x="410" y="172" text-anchor="middle" fill="#fff" font-size="10.5" opacity=".95">writes to AppState</text>

  <rect class="box" x="580" y="110" width="180" height="74" rx="12"/>
  <text class="h" x="670" y="140" text-anchor="middle">AppState</text>
  <text class="sub" x="670" y="158" text-anchor="middle">single source of truth</text>
  <text class="sub" x="670" y="172" text-anchor="middle">observable</text>

  <path class="flow" d="M240,140 L318,140"/>
  <text class="lbl" x="279" y="132" text-anchor="middle">intent</text>
  <path class="flow" d="M500,140 L578,140"/>
  <text class="lbl" x="539" y="132" text-anchor="middle">writes</text>

  <!-- AppState observed by View -->
  <path class="obs" d="M670,184 C670,234 150,234 150,186"/>
  <text class="lbl" x="410" y="228" text-anchor="middle">View observes AppState</text>

  <!-- Middle row: Repository & Service -->
  <rect class="box" x="200" y="270" width="180" height="60" rx="12"/>
  <text class="h" x="290" y="296" text-anchor="middle">Repository</text>
  <text class="sub" x="290" y="314" text-anchor="middle">data access (API, DB)</text>

  <rect class="box" x="440" y="270" width="180" height="60" rx="12"/>
  <text class="h" x="530" y="296" text-anchor="middle">Service</text>
  <text class="sub" x="530" y="314" text-anchor="middle">analytics, push, …</text>

  <path class="flow" d="M380,184 C360,215 320,240 300,268"/>
  <path class="flow" d="M440,184 C460,215 500,240 520,268"/>
  <text class="lbl" x="318" y="218" text-anchor="middle">calls</text>
  <text class="lbl" x="502" y="218" text-anchor="middle">calls</text>

  <!-- Environments row at bottom inside the container -->
  <text class="lblg" x="48" y="370">SAME WIRING, SWAPPABLE IMPLEMENTATIONS PER ENVIRONMENT</text>
  <g>
    <rect x="48" y="384" width="120" height="36" rx="18" fill="#fff" stroke="#D2931A" stroke-width="1.5"/>
    <text x="108" y="407" text-anchor="middle" font-size="12" font-weight="600">live</text>
    <text class="sub" x="178" y="407">real API, real DB</text>
  </g>
  <g>
    <rect x="320" y="384" width="120" height="36" rx="18" fill="#fff" stroke="#D2931A" stroke-width="1.5"/>
    <text x="380" y="407" text-anchor="middle" font-size="12" font-weight="600">preview</text>
    <text class="sub" x="450" y="407">stub data for SwiftUI previews</text>
  </g>
  <g>
    <rect x="620" y="384" width="80" height="36" rx="18" fill="#fff" stroke="#D2931A" stroke-width="1.5"/>
    <text x="660" y="407" text-anchor="middle" font-size="12" font-weight="600">test</text>
    <text class="sub" x="710" y="407">mocks</text>
  </g>
</svg>
