<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .bg{fill:#F8EFDC}
      .box{fill:#F6E8CE;stroke:#0F1B23;stroke-width:1.5}
      .gold{fill:#D2931A;stroke:#0F1B23;stroke-width:1.5}
      .arrow{stroke:#0F1B23;stroke-width:1.5;fill:none;marker-end:url(#a)}
      .dashed{stroke:#0F1B23;stroke-width:1.2;fill:none;stroke-dasharray:4 4;opacity:.5}
      .feed{stroke:#D2931A;stroke-width:1.5;fill:none;stroke-dasharray:2 4;marker-end:url(#g)}
      text{fill:#0F1B23;font-size:12px}
      .cap{font-size:10px;letter-spacing:1.5px;opacity:.55;font-weight:600}
      .h{font-size:13px;font-weight:700}
      .sub{font-size:10px;opacity:.65}
      .muted{fill:#0F1B23;opacity:.6;font-size:11px}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0F1B23"/>
    </marker>
    <marker id="g" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#D2931A"/>
    </marker>
  </defs>
  <rect class="bg" width="820" height="460"/>
  <text class="cap" x="40" y="34">CLEAN SwiftUI  ·  FIVE ROLES, ONE COMPOSITION ROOT</text>

  <!-- Roles area frame -->
  <rect x="40" y="50" width="740" height="300" rx="14" fill="none" stroke="#0F1B23" stroke-width="1" opacity=".15"/>
  <text class="cap" x="56" y="68" opacity=".5">THE FIVE ROLES</text>

  <!-- Row 1: View -> AppState -->
  <rect class="box" x="80" y="86" width="180" height="64" rx="10"/>
  <text class="h" x="170" y="116" text-anchor="middle">View</text>
  <text class="sub" x="170" y="134" text-anchor="middle">reads state · sends intents</text>

  <rect class="box" x="560" y="86" width="180" height="64" rx="10"/>
  <text class="h" x="650" y="116" text-anchor="middle">AppState</text>
  <text class="sub" x="650" y="134" text-anchor="middle">shared observable state</text>

  <!-- Row 2: Interactor center -->
  <rect class="gold" x="320" y="196" width="180" height="64" rx="10"/>
  <text class="h" x="410" y="226" text-anchor="middle" fill="#fff">Interactor</text>
  <text x="410" y="244" text-anchor="middle" fill="#fff" font-size="10" opacity=".9">use cases</text>

  <!-- Row 3: Repository | Service -->
  <rect class="box" x="80" y="296" width="180" height="54" rx="10"/>
  <text class="h" x="170" y="320" text-anchor="middle">Repository</text>
  <text class="sub" x="170" y="336" text-anchor="middle">data access</text>

  <rect class="box" x="560" y="296" width="180" height="54" rx="10"/>
  <text class="h" x="650" y="320" text-anchor="middle">Service</text>
  <text class="sub" x="650" y="336" text-anchor="middle">analytics, push, …</text>

  <!-- Arrows: View -> Interactor (intents) -->
  <path class="arrow" d="M170,150 C170,176 280,186 318,216"/>
  <!-- Interactor -> AppState (writes state) -->
  <path class="arrow" d="M500,226 C560,206 580,186 600,150"/>
  <!-- AppState -> View (observed) -->
  <path class="dashed" d="M560,118 L262,118"/>
  <text class="muted" x="411" y="110" text-anchor="middle">observes</text>

  <!-- Interactor -> Repository / Service -->
  <path class="arrow" d="M340,260 C300,280 240,290 220,294"/>
  <path class="arrow" d="M480,260 C520,280 580,290 600,294"/>

  <!-- DIContainer foundation -->
  <text class="cap" x="40" y="384">COMPOSITION ROOT  ·  WIRES EVERYTHING ABOVE</text>
  <rect x="40" y="394" width="740" height="50" rx="10" fill="#0F1B23"/>
  <text class="h" x="60" y="416" fill="#F8EFDC">DIContainer</text>
  <text x="60" y="432" fill="#F8EFDC" font-size="10" opacity=".7">builds &amp; injects every role · swap implementations per environment</text>
  <rect x="540" y="406" width="70" height="26" rx="13" fill="none" stroke="#F8EFDC" stroke-width="1" opacity=".7"/>
  <text x="575" y="423" text-anchor="middle" fill="#F8EFDC" font-size="10">live</text>
  <rect x="618" y="406" width="70" height="26" rx="13" fill="none" stroke="#F8EFDC" stroke-width="1" opacity=".7"/>
  <text x="653" y="423" text-anchor="middle" fill="#F8EFDC" font-size="10">preview</text>
  <rect x="696" y="406" width="70" height="26" rx="13" fill="none" stroke="#F8EFDC" stroke-width="1" opacity=".7"/>
  <text x="731" y="423" text-anchor="middle" fill="#F8EFDC" font-size="10">test</text>

  <!-- DI feeds (gold dashed up into roles) -->
  <path class="feed" d="M170,394 L170,355"/>
  <path class="feed" d="M410,394 L410,265"/>
  <path class="feed" d="M650,394 L650,355"/>
  <text class="muted" x="260" y="388" font-size="10" opacity=".55">injects →</text>
</svg>
