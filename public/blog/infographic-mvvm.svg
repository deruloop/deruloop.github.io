<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .bg{fill:#F8EFDC}
      .box{fill:#F6E8CE;stroke:#0F1B23;stroke-width:1.5}
      .arrow{stroke:#0F1B23;stroke-width:1.5;fill:none;marker-end:url(#a)}
      text{fill:#0F1B23;font-size:12px}
      .cap{font-size:10px;letter-spacing:1.5px;opacity:.55;font-weight:600}
      .h{font-size:13px;font-weight:700}
      .muted{fill:#0F1B23;opacity:.6;font-size:11px}
      .pill{fill:#D2931A}
      .pillTxt{fill:#fff;font-size:10px;font-weight:600}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0F1B23"/>
    </marker>
  </defs>
  <rect class="bg" width="800" height="380"/>
  <text class="cap" x="40" y="34">SMALL SCALE  →  MASSIVE VIEWMODEL</text>

  <!-- LEFT: clean MVVM -->
  <text class="h" x="60" y="70">Small scale</text>
  <rect class="box" x="60" y="90" width="100" height="50" rx="8"/>
  <text class="h" x="110" y="120" text-anchor="middle">View</text>
  <rect class="box" x="220" y="90" width="120" height="50" rx="8"/>
  <text class="h" x="280" y="120" text-anchor="middle">ViewModel</text>
  <rect class="box" x="130" y="200" width="180" height="50" rx="8"/>
  <text class="h" x="220" y="230" text-anchor="middle">Model / Repository</text>
  <line class="arrow" x1="160" y1="115" x2="218" y2="115"/>
  <line class="arrow" x1="270" y1="140" x2="240" y2="198"/>
  <line class="arrow" x1="190" y1="200" x2="130" y2="142"/>
  <text class="muted" x="60" y="290">View binds state · VM maps data</text>

  <!-- divider -->
  <line x1="400" y1="60" x2="400" y2="340" stroke="#0F1B23" stroke-opacity=".2" stroke-dasharray="3 4"/>

  <!-- RIGHT: Massive ViewModel -->
  <text class="h" x="440" y="70">As the app grows</text>
  <rect class="box" x="440" y="90" width="80" height="50" rx="8"/>
  <text class="h" x="480" y="120" text-anchor="middle">View</text>
  <line class="arrow" x1="520" y1="115" x2="558" y2="115"/>

  <!-- Big VM container -->
  <rect x="560" y="90" width="200" height="220" rx="12" fill="#D2931A" fill-opacity=".15" stroke="#D2931A" stroke-width="1.5"/>
  <rect x="580" y="100" width="160" height="34" rx="8" fill="#D2931A"/>
  <text class="h" x="660" y="122" text-anchor="middle" fill="#fff">ViewModel</text>

  <!-- Pills inside, one per row -->
  <g>
    <rect class="pill" x="580" y="146" width="74" height="18" rx="9"/>
    <text class="pillTxt" x="617" y="159" text-anchor="middle">networking</text>
    <rect class="pill" x="660" y="146" width="80" height="18" rx="9"/>
    <text class="pillTxt" x="700" y="159" text-anchor="middle">validation</text>

    <rect class="pill" x="580" y="170" width="48" height="18" rx="9"/>
    <text class="pillTxt" x="604" y="183" text-anchor="middle">retry</text>
    <rect class="pill" x="634" y="170" width="106" height="18" rx="9"/>
    <text class="pillTxt" x="687" y="183" text-anchor="middle">error mapping</text>

    <rect class="pill" x="580" y="194" width="74" height="18" rx="9"/>
    <text class="pillTxt" x="617" y="207" text-anchor="middle">formatting</text>
    <rect class="pill" x="660" y="194" width="80" height="18" rx="9"/>
    <text class="pillTxt" x="700" y="207" text-anchor="middle">analytics</text>

    <rect class="pill" x="580" y="218" width="74" height="18" rx="9"/>
    <text class="pillTxt" x="617" y="231" text-anchor="middle">navigation</text>
    <rect class="pill" x="660" y="218" width="80" height="18" rx="9"/>
    <text class="pillTxt" x="700" y="231" text-anchor="middle">caching</text>

    <rect class="pill" x="580" y="242" width="74" height="18" rx="9"/>
    <text class="pillTxt" x="617" y="255" text-anchor="middle">sync</text>
    <rect class="pill" x="660" y="242" width="80" height="18" rx="9"/>
    <text class="pillTxt" x="700" y="255" text-anchor="middle">DI ad-hoc</text>

    <rect class="pill" x="580" y="266" width="160" height="18" rx="9"/>
    <text class="pillTxt" x="660" y="279" text-anchor="middle">…and more</text>
  </g>
  <text class="muted" x="440" y="335">No DI strategy · navigation has no clear owner</text>
</svg>
