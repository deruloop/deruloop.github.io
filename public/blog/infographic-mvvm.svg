<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .bg{fill:#F8EFDC}
      .box{fill:#F6E8CE;stroke:#0F1B23;stroke-width:1.5}
      .arrow{stroke:#0F1B23;stroke-width:1.5;fill:none;marker-end:url(#a)}
      text{fill:#0F1B23;font-size:12px}
      .cap{font-size:10px;letter-spacing:1.5px;opacity:.55;font-weight:600}
      .h{font-size:13px;font-weight:700}
      .muted{fill:#0F1B23;opacity:.6;font-size:11px}
      .gold{fill:#D2931A}
      .pillTxt{fill:#fff;font-size:9px;font-weight:600}
    </style>
    <marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#0F1B23"/>
    </marker>
  </defs>
  <rect class="bg" width="800" height="360"/>
  <text class="cap" x="40" y="34">SMALL SCALE  ·  GROWS INTO MASSIVE VIEWMODEL</text>

  <!-- LEFT: clean MVVM -->
  <text class="h" x="60" y="70">Small scale</text>
  <rect class="box" x="60" y="90" width="100" height="50" rx="8"/><text class="h" x="110" y="120" text-anchor="middle">View</text>
  <rect class="box" x="200" y="90" width="120" height="50" rx="8"/><text class="h" x="260" y="120" text-anchor="middle">ViewModel</text>
  <rect class="box" x="60" y="200" width="260" height="50" rx="8"/><text class="h" x="190" y="230" text-anchor="middle">Model / Repository</text>
  <line class="arrow" x1="160" y1="115" x2="198" y2="115"/>
  <line class="arrow" x1="260" y1="140" x2="260" y2="198"/>
  <line class="arrow" x1="190" y1="200" x2="115" y2="142"/>
  <text class="muted" x="60" y="280">View binds state · VM maps data</text>

  <!-- divider -->
  <line x1="400" y1="60" x2="400" y2="320" stroke="#0F1B23" stroke-opacity=".2" stroke-dasharray="3 4"/>

  <!-- RIGHT: Massive ViewModel -->
  <text class="h" x="440" y="70">As the app grows</text>
  <rect class="box" x="440" y="90" width="80" height="50" rx="8"/><text class="h" x="480" y="120" text-anchor="middle">View</text>
  <rect x="560" y="80" width="200" height="220" rx="12" fill="#D2931A" opacity=".15" stroke="#D2931A" stroke-width="1.5"/>
  <rect x="580" y="100" width="160" height="50" rx="8" fill="#D2931A"/>
  <text class="h" x="660" y="130" text-anchor="middle" fill="#fff">ViewModel</text>
  <line class="arrow" x1="520" y1="125" x2="578" y2="125"/>

  <g>
    <rect class="gold" x="580" y="165" width="74" height="16" rx="8"/><text class="pillTxt" x="617" y="177" text-anchor="middle">networking</text>
    <rect class="gold" x="660" y="165" width="78" height="16" rx="8"/><text class="pillTxt" x="699" y="177" text-anchor="middle">validation</text>
    <rect class="gold" x="580" y="188" width="48" height="16" rx="8"/><text class="pillTxt" x="604" y="200" text-anchor="middle">retry</text>
    <rect class="gold" x="634" y="188" width="68" height="16" rx="8"/><text class="pillTxt" x="668" y="200" text-anchor="middle">err. mapping</text>
    <rect class="gold" x="708" y="188" width="32" height="16" rx="8"/><text class="pillTxt" x="724" y="200" text-anchor="middle">fmt</text>
    <rect class="gold" x="580" y="211" width="60" height="16" rx="8"/><text class="pillTxt" x="610" y="223" text-anchor="middle">analytics</text>
    <rect class="gold" x="646" y="211" width="42" height="16" rx="8"/><text class="pillTxt" x="667" y="223" text-anchor="middle">nav</text>
    <rect class="gold" x="694" y="211" width="46" height="16" rx="8"/><text class="pillTxt" x="717" y="223" text-anchor="middle">cache</text>
    <rect class="gold" x="580" y="234" width="44" height="16" rx="8"/><text class="pillTxt" x="602" y="246" text-anchor="middle">sync</text>
    <rect class="gold" x="630" y="234" width="60" height="16" rx="8"/><text class="pillTxt" x="660" y="246" text-anchor="middle">DI ad-hoc</text>
  </g>
  <text class="muted" x="440" y="280">No DI strategy · navigation has no clear owner</text>
</svg>
