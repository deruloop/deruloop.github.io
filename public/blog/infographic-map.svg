<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="-apple-system, system-ui, sans-serif">
  <defs>
    <style>
      .bg{fill:#F8EFDC}
      .ink{fill:#0F1B23}
      .muted{fill:#0F1B23;opacity:.55}
      .gold{fill:#D2931A}
      .line{stroke:#0F1B23;stroke-width:1.5;fill:none}
      .lineDash{stroke:#0F1B23;stroke-width:1.5;fill:none;stroke-dasharray:3 4;opacity:.5}
      .node{fill:#F6E8CE;stroke:#0F1B23;stroke-width:1.5}
      .nodeAccent{fill:#D2931A;stroke:#0F1B23;stroke-width:1.5}
      text{fill:#0F1B23}
      .label{font-size:13px;font-weight:600}
      .sub{font-size:10px;opacity:.6}
      .cap{font-size:10px;letter-spacing:1.5px;opacity:.55;font-weight:600}
    </style>
  </defs>
  <rect class="bg" width="800" height="280"/>
  <text class="cap" x="40" y="40">EVOLUTION OF iOS ARCHITECTURES</text>

  <!-- timeline -->
  <line class="line" x1="60" y1="160" x2="740" y2="160"/>

  <g transform="translate(100,160)">
    <circle class="node" r="22"/>
    <text class="label" text-anchor="middle" y="5">MVC</text>
    <text class="sub" text-anchor="middle" y="50">Massive VC</text>
  </g>

  <g transform="translate(220,160)">
    <circle class="node" r="22"/>
    <text class="label" text-anchor="middle" y="5">MVVM</text>
    <text class="sub" text-anchor="middle" y="50">Massive VM</text>
  </g>

  <g transform="translate(340,160)">
    <circle class="node" r="22"/>
    <text class="label" text-anchor="middle" y="5">VIPER</text>
    <text class="sub" text-anchor="middle" y="50">over-split</text>
  </g>

  <g transform="translate(460,160)">
    <circle class="nodeAccent" r="26"/>
    <text class="label" text-anchor="middle" y="5" fill="#fff">Clean</text>
    <text class="sub" text-anchor="middle" y="54">compass</text>
  </g>

  <g transform="translate(580,160)">
    <circle class="node" r="22"/>
    <text class="label" text-anchor="middle" y="5">Service</text>
    <text class="sub" text-anchor="middle" y="50">SwiftUI shape</text>
  </g>

  <g transform="translate(700,160)">
    <circle class="node" r="22"/>
    <text class="label" text-anchor="middle" y="5">TCA</text>
    <text class="sub" text-anchor="middle" y="50">rigorous</text>
  </g>

  <text class="sub" x="60" y="220">complexity in one object</text>
  <text class="sub" x="640" y="220">explicit, unidirectional</text>
</svg>
